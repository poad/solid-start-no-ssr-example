packages:
  - ./app
  - ./cdk
  - ./cdk/function

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - 'lodash@4.18.1'
  - defu@6.1.7
  - vite@7.3.2 || 8.0.7
  - fast-uri@3.1.2

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver

overrides:
  chokidar: '>=5'
  fast-uri@<=3.1.1: ^3.1.2
  flatted@<=3.4.1: '>=3.4.2'
  h3@<1.15.6: '>=1.15.6'
  h3@<1.15.9: '>=1.15.9'
  h3@<=1.15.4: '>=1.15.5'
  h3@<=1.15.8: '>=1.15.9'
  semver: '>=7'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  vite@<=6.4.1: '>=6.4.2'
  vite@>=7.0.0 <=7.3.1: '>=7.3.2'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'

trustPolicy: no-downgrade
