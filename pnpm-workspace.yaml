packages:
  - ./app
  - ./cdk
  - ./cdk/function

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - 'lodash@4.18.1'
  - defu@6.1.6

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver

overrides:
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  chokidar: '>=5'
  defu@<=6.1.4: '>=6.1.5'
  flatted@<=3.4.1: '>=3.4.2'
  h3@<1.15.6: '>=1.15.6'
  h3@<1.15.9: '>=1.15.9'
  h3@<=1.15.4: '>=1.15.5'
  h3@<=1.15.8: '>=1.15.9'
  semver: '>=7'
  serialize-javascript@<=7.0.2: '>=7.0.3'

trustPolicy: no-downgrade
trustPolicyExclude:
  - 'vite@6.4.1'
